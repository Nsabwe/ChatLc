<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OurMarket Sell</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css"/>

  <style>
    body { margin:0; font-family:Arial; background:#f6f6f6; }

    .topbar {
      display:flex; justify-content:space-between;
      padding:12px; background:white; border-bottom:1px solid gold;
    }

    .logo { font-weight:bold; color:green; }

    .back-btn {
      background:#333; color:white; border:none;
      padding:8px 12px; border-radius:6px;
    }

    .image-box, .form-container {
      background:white; margin:10px auto;
      padding:15px; border-radius:10px;
      max-width:500px;
    }

    #previewContainer {
      display:flex; gap:10px; flex-wrap:wrap;
      justify-content:center; margin-top:10px;
    }

    .preview-img {
      width:150px; height:150px;
      object-fit:cover; border-radius:10px;
      border:1px solid gold;
      cursor:pointer;
    }

    #cropModal {
      display:none; position:fixed;
      top:0; left:0; width:100%; height:100%;
      background:rgba(0,0,0,0.8);
      justify-content:center; align-items:center;
      z-index:999;
    }

    .crop-box {
      background:white; padding:10px;
      border-radius:10px; max-width:90%;
    }

    .crop-img { max-width:100%; }

    .crop-actions {
      display:flex; justify-content:space-between;
      margin-top:10px;
    }

    button {
      padding:10px; border:none;
      border-radius:6px; cursor:pointer;
    }

    .save-btn { background:green; color:white; }
    .cancel-btn { background:red; color:white; }

    input, select {
      width:100%; padding:12px;
      margin:8px 0;
      border-radius:8px;
      border:1px solid #ccc;
      box-sizing:border-box;
    }

    .post-btn {
      width:100%;
      background:green;
      color:white;
    }

    #progressBox { margin-top:10px; display:none; }
  </style>
</head>

<body>

<div class="topbar">
  <div class="logo">OurMarket</div>
  <button class="back-btn" onclick="goBack()">Back</button>
</div>

<!-- IMAGE UPLOAD -->
<div class="image-box">
  <input type="file" id="imageInput" accept="image/*" multiple>
  <div id="previewContainer"></div>

  <!-- PROGRESS -->
  <div id="progressBox">
    <div style="background:#ddd; height:10px; border-radius:5px;">
      <div id="progressBar" style="width:0%; height:10px; background:green; border-radius:5px;"></div>
    </div>
    <p id="progressText">0%</p>
  </div>
</div>

<!-- CROPPER -->
<div id="cropModal">
  <div class="crop-box">
    <img id="cropImage" class="crop-img">
    <div class="crop-actions">
      <button class="cancel-btn" onclick="closeCrop()">Cancel</button>
      <button class="save-btn" onclick="saveCrop()">Save</button>
    </div>
  </div>
</div>

<!-- FORM -->
<div class="form-container">
  <select id="category">
    <option>Phone</option>
    <option>Clothes</option>
    <option>Land</option>
    <option>House/Car</option>
    <option>Others</option>
  </select>

  <input id="name" placeholder="Product name">
  <input id="price" type="number" placeholder="Price (MWK)">
  <input id="phone" placeholder="Phone number">
  <input id="location" placeholder="Location">

  <button class="post-btn" onclick="uploadProduct()">Post Product</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyCkvqdZoceAjEp_ANfSl0mjGVGrxP8vm_o",
  authDomain: "spaida-backend.firebaseapp.com",
  projectId: "spaida-backend",
  storageBucket: "spaida-backend.appspot.com",
  messagingSenderId: "309426419976",
  appId: "1:309426419976:web:fc1bc37dddb83c454454bd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

let cropper;
let tempIndex = null;
let croppedImages = [];

window.goBack = () => window.location.href = "feed.html";

/* ---------------- CROPPER ---------------- */

window.openCrop = function(src, index) {
  tempIndex = index;
  const modal = document.getElementById("cropModal");
  const img = document.getElementById("cropImage");

  modal.style.display = "flex";
  img.src = src;

  img.onload = () => {
    if (cropper) cropper.destroy();
    cropper = new Cropper(img, { aspectRatio: 1 });
  };
};

window.saveCrop = function() {
  const canvas = cropper.getCroppedCanvas({ width: 500, height: 500 });
  const cropped = canvas.toDataURL("image/png");

  croppedImages[tempIndex] = cropped;
  document.querySelectorAll(".preview-img")[tempIndex].src = cropped;

  closeCrop();
};

window.closeCrop = function() {
  document.getElementById("cropModal").style.display = "none";
  if (cropper) cropper.destroy();
};

/* ---------------- IMAGE INPUT ---------------- */

document.getElementById("imageInput").addEventListener("change", function(e) {
  const files = Array.from(e.target.files);
  const container = document.getElementById("previewContainer");

  if (files.length > 2) {
    alert("Only 1–2 images allowed");
    return;
  }

  container.innerHTML = "";
  croppedImages = [];

  files.forEach((file, i) => {
    const reader = new FileReader();

    reader.onload = (ev) => {
      const img = document.createElement("img");
      img.src = ev.target.result;
      img.className = "preview-img";
      img.onclick = () => openCrop(ev.target.result, i);

      container.appendChild(img);
      croppedImages[i] = null;
    };

    reader.readAsDataURL(file);
  });
});

/* ---------------- UPLOAD ---------------- */

window.uploadProduct = async function() {
  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const phone = document.getElementById("phone").value;
  const location = document.getElementById("location").value;
  const category = document.getElementById("category").value;

  const images = croppedImages.filter(Boolean);

  if (!name || !price) return alert("Fill required fields");
  if (images.length === 0) return alert("Crop at least 1 image");

  try {
    document.getElementById("progressBox").style.display = "block";

    let imageUrls = [];
    const baseTime = Date.now();

    for (let i = 0; i < images.length; i++) {
      const imgRef = ref(storage, `products/${baseTime}_${i}`);
      const uploadTask = uploadBytesResumable(imgRef, images[i]);

      await new Promise((resolve, reject) => {
        uploadTask.on("state_changed",
          (snap) => {
            let percent = (snap.bytesTransferred / snap.totalBytes) * 100;
            document.getElementById("progressBar").style.width = percent + "%";
            document.getElementById("progressText").innerText =
              Math.round(percent) + "%";
          },
          reject,
          async () => {
            const url = await getDownloadURL(uploadTask.snapshot.ref);
            imageUrls.push(url);
            resolve();
          }
        );
      });
    }

    await addDoc(collection(db, "products"), {
      name,
      price: Number(price),
      phone,
      location,
      category,
      images: imageUrls,
      createdAt: serverTimestamp()
    });

    alert("✅ Uploaded!");

    document.getElementById("progressBox").style.display = "none";
    document.getElementById("previewContainer").innerHTML = "";
    croppedImages = [];

  } catch (err) {
    console.error(err);
    alert("❌ Error: " + err.message);
  }
};
</script>

</body>
</html>
